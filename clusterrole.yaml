apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-mcp-readonly

rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - services
    - namespaces
    - events
    - configmaps
  verbs:
    - get
    - list
    - watch

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - statefulsets
    - daemonsets
  verbs:
    - get
    - list
    - watch

# Same metrics as `kubectl top pods` (metrics-server)
- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
  verbs:
    - get
    - list
